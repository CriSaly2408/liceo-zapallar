<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Horario</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #0b2c6b, #0e4ea8);
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:1100px;
  background:#f2f2f2;
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
  text-align:center;
  color:#0b2c6b;
  margin-bottom:20px;
}

table{
  width:100%;
  border-collapse:collapse;
  overflow:hidden;
  border-radius:15px;
}

/* HEADER */
th{
  background:#0b2c6b;
  color:white;
  padding:10px;
}

/* CELDAS */
td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
  font-size:13px;
}

/* BLOQUE */
.bloque{
  background:#a8d63b;
  font-weight:bold;
  width:60px;
}

/* HORA */
.hora{
  font-weight:bold;
  width:120px;
}

/* RECREO */
.recreo{
  background:#dfead7;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">
  <h1 id="titulo">Horario</h1>

  <table id="tabla">

        <th>Bloque</th>
        <th>Hora</th>
        <th>Lunes</th>
        <th>Martes</th>
        <th>Miércoles</th>
        <th>Jueves</th>
        <th>Viernes</th>
      </tr>
    </thead>
<tbody>

<tr>
  <td class="bloque">1</td>
  <td class="hora">08:00-08:45</td>
  <td id="l1"></td><td id="m1"></td><td id="mi1"></td><td id="j1"></td><td id="v1"></td>
</tr>

<tr>

  <td id="l2"></td><td id="m2"></td><td id="mi2"></td><td id="j2"></td><td id="v2"></td>
</tr>

<tr class="recreo">

</tr>

<tr>

</tr>

<tr>
  <td class="bloque">6</td>
  <td class="hora">12:20-13:05</td>

</tr>

<tr class="recreo">

</tr>

<tr>
  <td class="bloque">7</td>
  <td class="hora">14:05-14:50</td>
  <td id="l7"></td><td id="m7"></td><td id="mi7"></td><td id="j7"></td><td id="v7"></td>
</tr>

<tr>
  <td class="bloque">8</td>
  <td class="hora">14:50-15:35</td>
  <td id="l8"></td><td id="m8"></td><td id="mi8"></td><td id="j8"></td><td id="v8"></td>
</tr>

<tr class="recreo">
  <td colspan="7">15:35 - 15:45</td>
</tr>

<tr>
  <td class="bloque">9</td>
  <td class="hora">15:45-16:25</td>
  <td id="l9"></td><td id="m9"></td><td id="mi9"></td><td id="j9"></td><td id="v9"></td>
</tr>
</tbody>
  </table>
</div>

<script>

// PARAMS

const curso = params.get("curso");
const letra = params.get("letra");

document.getElementById("titulo").innerText = curso + " " + letra;

const horariosCSV = {

    "C": "Phttps://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=1691923268&single=true&output=csv"
  },

  "1° Medio": {
    "A": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=189774496&single=true&output=csv",
    "B": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=1261140492&single=true&output=csv",
    "C": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=2021200247&single=true&output=csv",
    "D": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=1077720755&single=true&output=csv",
    "E": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=1996071175&single=true&output=csv"
  },

  "2° Medio": {

    "B": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=1932571857&single=true&output=csv",
    "C": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=1649641245&single=true&output=csv",
    "D": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=223180690&single=true&output=csv",
    "E": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=635575135&single=true&output=csv"
  },

  "3° Medio": {
    "A": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=1322309767&single=true&output=csv",
    "B": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=823549894&single=true&output=csv",
    "C": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=1429877151&single=true&output=csv",
    "D": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=1084873530&single=true&output=csv",
    "E": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=1611968817&single=true&output=csv"
  },

  "4° Medio": {
    "A": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=1770975291&single=true&output=csv",
    "B": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=1991879615&single=true&output=csv",
    "C": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=1368015605&single=true&output=csv",
    "D": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=805049469&single=true&output=csv",
    "E": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5EymoZHN-NxIlNMWnV7GYni9yVXF2trFPJHVfFiQN6K6FqNuhg7n3NNSdEs9otA/pub?gid=2013189264&single=true&output=csv"
  }

};



// URL
const url = horariosCSV[curso]?.[letra];

fetch(url)
  .then(res => res.text())
  .then(data => {

    const filas = data.split("\n");

    // 🔥 función limpiar
    const limpiar = txt => {
      txt = txt.replace(/"/g, "").trim();

      if(txt.toUpperCase().includes("RECREO")){
        return "RECREO";
      }

      return txt.replace(/\(/g, "<br>(");
    };

    // 🔥 recorrer filas
    filas.slice(1).forEach((fila, i) => {

      const col = fila.split(",");

      if(col.length < 7) return;

      // 🔥 detectar recreo
      const esRecreo = col[2]?.toUpperCase().includes("RECREO");

      const filaHTML = document.querySelectorAll("#tabla tbody tr")[i];

      if(filaHTML && esRecreo){
        filaHTML.classList.add("recreo");
      }

      // 🔥 rellenar celdas
      const l = document.getElementById("l" + (i+1));
      const m = document.getElementById("m" + (i+1));
      const mi = document.getElementById("mi" + (i+1));
      const j = document.getElementById("j" + (i+1));
      const v = document.getElementById("v" + (i+1));

      if(l) l.innerHTML = limpiar(col[2]);
      if(m) m.innerHTML = limpiar(col[3]);
      if(mi) mi.innerHTML = limpiar(col[4]);
      if(j) j.innerHTML = limpiar(col[5]);
      if(v) v.innerHTML = limpiar(col[6]);

    });

  })
  .catch(err => console.error("Error:", err));

</script>

</body>
</html>
