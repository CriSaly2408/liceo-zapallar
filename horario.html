// 🔥 OBTENER LINK CORRECTO
const url = horariosCSV[curso]?.[letra];

if(!url || url.includes("PEGAR")){
  alert("⚠️ Falta configurar este horario");
}


// 🔥 CARGAR CSV
fetch(url)
  .then(res => res.text())
  .then(data => {

    const filas = data.split("\n");
    const tabla = document.getElementById("tabla");

    filas.forEach(fila => {

      const tr = document.createElement("tr");

      fila.split(",").forEach(col => {
        const td = document.createElement("td");
        td.textContent = col.replace(/"/g, "").trim();
        tr.appendChild(td);
      });

      tabla.appendChild(tr);
    });

  })
  .catch(err => {
    console.error("Error:", err);
  });
