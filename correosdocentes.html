<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Correos Docentes</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #0b2c6b, #0e4ea8);
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:800px;
  background:#f2f2f2;
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
  text-align:center;
  color:#0b2c6b;
  margin-bottom:20px;
}

table{
  width:100%;
  border-collapse:collapse;
  overflow:hidden;
  border-radius:15px;
}

th{
  background:#0b2c6b;
  color:white;
  padding:10px;
}

td{
  border:1px solid #ccc;
  padding:10px;
  text-align:left;
}

tr:hover{
  background:#e6eefc;
}

/* ===================================== */
/* 📱 MODO MOBILE UNIVERSAL PRO          */
/* ===================================== */

@media (max-width: 768px){

  body{
    padding:10px;
  }

  .container{
    width:100%;
    padding:12px;
  }

  /* 🔥 TABLAS MÁS LIMPIAS */
  table{
    width:100%;
    border-collapse:collapse;
  }

  /* 🔥 OCULTAR HEADER */
  table tr:first-child{
    display:none;
  }

  /* ===================================== */
  /* 📋 LISTAS Y CORREOS → TARJETAS       */
  /* ===================================== */

  table tr{
    display:block;
    background:white;
    margin-bottom:12px;
    padding:12px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
    border-left:5px solid #0e4ea8;
  }

  table td{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border:none;
    padding:6px 0;
    font-size:14px;
  }

  /* 🔥 NUMERO BONITO */
  .numero{
    background:#0e4ea8;
    color:white;
    border-radius:6px;
    padding:4px 8px;
    font-size:13px;
    width:auto;
  }

  /* ===================================== */
  /* 🧠 AUTO-LABELS SEGÚN TABLA           */
  /* ===================================== */

  /* LISTA */
  table td:nth-child(1)::before{
    content:"N°";
    font-weight:bold;
    color:#0e4ea8;
  }

  table td:nth-child(2)::before{
    content:"Nombre";
    font-weight:bold;
    color:#0e4ea8;
  }

  /* CORREOS */
  table td:nth-child(2)::before{
    content:"Correo";
  }

  /* ===================================== */
  /* 🕒 HORARIOS → SCROLL HORIZONTAL      */
  /* ===================================== */

  .tabla-scroll{
    overflow-x:auto;
    -webkit-overflow-scrolling: touch;
    border-radius:10px;
  }

  .tabla-scroll table{
    min-width:700px;
  }

  /* OPCIONAL: barra más bonita */
  .tabla-scroll::-webkit-scrollbar{
    height:6px;
  }

  .tabla-scroll::-webkit-scrollbar-thumb{
    background:#0e4ea8;
    border-radius:10px;
  }

  /* ===================================== */
  /* 🔷 INPUTS ARRIBA                     */
  /* ===================================== */

  .info{
    flex-direction:column;
    border-radius:15px;
    padding:10px;
  }

  .info input{
    font-size:14px;
  }

}
</style>
</head>

<body>

<div class="container">
  <h1>Correos Docentes</h1>

  <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Correo</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<script>

// 🔥 TU CSV
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXkTkS4ZNn3s2wvUyT8SFpr1pW0AdD91Vgfr54ug-_nYpQxQ1zX5c41SQgqpIs2A/pub?gid=1346561782&single=true&output=csv";

fetch(url)
  .then(res => res.text())
  .then(data => {

    const filas = data.split("\n");
    const tabla = document.getElementById("tabla");

    filas.slice(1).forEach(fila => {

      const separador = fila.includes(";") ? ";" : ",";

      const col = fila
        .split(new RegExp(`${separador}(?=(?:(?:[^"]*"){2})*[^"]*$)`))
        .map(c => c.replace(/"/g, "").trim());

      if(col.length < 2) return;

      const tr = document.createElement("tr");

      const tdNombre = document.createElement("td");
      const tdCorreo = document.createElement("td");

      tdNombre.textContent = col[0];
      tdCorreo.innerHTML = `<a href="mailto:${col[1]}">${col[1]}</a>`;

      tr.appendChild(tdNombre);
      tr.appendChild(tdCorreo);

      tabla.appendChild(tr);

    });

  })
  .catch(err => console.error("Error:", err));

</script>

</body>
</html>
