  url = documentos.pei[anio];
}

if(tipo === "reglamento"){
  url = documentos.reglamento[anio]?.[doc];
}

if(tipo === "cuenta"){
  url = documentos.cuenta[anio];
}

if(!url){
  document.getElementById("tituloHero").innerText = "Documento no disponible";
  document.getElementById("visor").style.display = "none";
  throw new Error("Documento no configurado");
}


document.getElementById("visor").src = url;
document.getElementById("btnDoc").href = url;

let titulo = "";

if(tipo === "pei") titulo = "Proyecto Educativo " + anio;
if(tipo === "cuenta") titulo = "Cuenta Pública " + anio;

if(tipo === "reglamento"){
  titulo = "Reglamento " + anio + " - " + (doc === "interno" ? "Interno" : "Evaluación y Promoción");
}

document.getElementById("tituloHero").innerText = titulo;
