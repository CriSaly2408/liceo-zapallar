<script>
(function() {

  const URL_SLIDER = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQnpSJn5CYe2KosLKP28VPvjb673XRTuMnXwL8rmAisGHoVCL8LfDanXKJXJOL2yLBZdOUSzsEAsBZh/pub?gid=0&single=true&output=csv";

  document.addEventListener("DOMContentLoaded", () => {

    const slider = document.getElementById("slider");
    const dotsContainer = document.getElementById("slider-dots");

    if (!slider || !dotsContainer) {
      console.error("Falta slider o dots");
      return;
    }

    fetch(URL_SLIDER)
      .then(res => res.text())
      .then(data => {

        const filas = data.trim().split("\n").slice(1);

        const imagenes = filas
          .map(f => f.replace(/"/g, "").trim())
          .filter(f => f !== "");

        if (imagenes.length === 0) return;

        let index = 0;
        let interval;

        function actualizarSlider() {
          slider.style.transform = `translateX(-${index * 100}%)`;

          const dots = dotsContainer.querySelectorAll("span");
          dots.forEach(d => d.classList.remove("active"));
          dots[index].classList.add("active");
        }

        function iniciarIntervalo() {
          interval = setInterval(() => {
            index++;
            if (index >= imagenes.length) index = 0;
            actualizarSlider();
          }, 7000);
        }

        function reiniciarIntervalo() {
          clearInterval(interval);
          iniciarIntervalo();
        }

        // CREAR SLIDES + DOTS
        imagenes.forEach((img, i) => {

          const div = document.createElement("div");
          div.classList.add("slide");
          div.style.backgroundImage = `url(${img})`;
          slider.appendChild(div);

          const dot = document.createElement("span");
          if (i === 0) dot.classList.add("active");

          dot.addEventListener("click", () => {
            index = i;
            actualizarSlider();
            reiniciarIntervalo();
          });

          dotsContainer.appendChild(dot);
        });

        actualizarSlider();
        iniciarIntervalo();

      })
      .catch(err => console.error("Slider error:", err));

  });

})();

</script>

<!-- MODAL -->
<div id="modalImagen" class="modal-img">

<!-- JS -->
<script>
function abrirImagen(e, el){
  e.preventDefault();
  e.stopPropagation();

  const card = el.closest(".card");
  const img = card.querySelector(".card-img");

  document.getElementById("modalImagen").style.display = "flex";
  document.getElementById("imgGrande").src = img.src;
}

function cerrarImagen(){
  document.getElementById("modalImagen").style.display = "none";
}
</script>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQUrU67cTk056Ep5g-mGjHJ17lwbwCg5NgBiV12reLzFX90QdLHhrIKzBJZ8ZVEv_TJlmFA_hEGUQB/pub?gid=0&single=true&output=csv";

window.onload = () => {
  const modal = document.getElementById("modalUrgente");
  const texto = document.getElementById("mensajeUrgente");
  const cerrar = document.querySelector(".cerrar");
  const btn = document.getElementById("btnCerrar");

  // Estado inicial
  modal.style.display = "none";

  // Eventos de cierre
  cerrar.onclick = () => modal.style.display = "none";
  btn.onclick = () => modal.style.display = "none";

  window.onclick = (e) => {
    if (e.target === modal) {
      modal.style.display = "none";
    }
  };

  fetch(URL + "&t=" + new Date().getTime())
    .then(res => res.text())
    .then(data => {
      const filas = data.trim().split("\n");

      if (filas.length < 2) return;

      const valores = filas[1].split(",");
      const activo = valores[0].trim();
      const mensaje = valores.slice(1).join(",");

      if (activo === "1") {
        texto.textContent = mensaje;
        modal.style.display = "block";
      } else {
        modal.style.display = "none";
      }
    })
    .catch(err => console.error("ERROR:", err));
};
</script>
