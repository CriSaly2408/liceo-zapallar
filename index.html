<!-- MODAL NOTICIA URGENTE -->
<div id="modalUrgente" class="modal">
  <div class="modal-content">
    <span class="cerrar">&times;</span>

    <h2>⚠️ Aviso Importante</h2>

    <p id="mensajeUrgente">
      Cargando aviso...
    </p>

    <button id="btnCerrar">Entendido</button>
  </div>
</div>


<!-- SCRIPTS -->
<script src="js/noticias.js"></script>
<script src="js/cursos.js"></script>
<script src="js/menu.js" defer></script>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQUrU67cTk056Ep5g-mGjHJ17lwbwCg5NgBiV12reLzFX90QdLHhrIKzBJZ8ZVEv_TJlmFA_hEGUQB/pub?gid=0&single=true&output=csv";

window.onload = () => {

  const modal = document.getElementById("modalUrgente");
  const texto = document.getElementById("mensajeUrgente");
  const cerrar = document.querySelector(".cerrar");
  const btn = document.getElementById("btnCerrar");

  modal.style.display = "none";

  cerrar.onclick = () => modal.style.display = "none";
  btn.onclick = () => modal.style.display = "none";

  window.onclick = (e) => {
    if (e.target === modal) modal.style.display = "none";
  };

  fetch(URL + "&t=" + new Date().getTime())
    .then(res => res.text())
    .then(data => {
      const filas = data.trim().split("\n");
      if (filas.length < 2) return;

      const valores = filas[1].split(",");
      const activo = valores[0].trim();
      const mensaje = valores.slice(1).join(",");

      if (activo === "1") {
        texto.textContent = mensaje;
        modal.style.display = "block";
      } else {
        modal.style.display = "none";
      }
    })
    .catch(err => console.error("ERROR:", err));

};
</script>
