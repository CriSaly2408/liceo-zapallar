<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiénes Somos</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #0b2c6b, #0e4ea8);
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:800px;
  background:#f2f2f2;
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
  text-align:center;
  color:#0b2c6b;
  margin-bottom:20px;
}

.imagen-grupo{
  width:100%;
  border-radius:15px;
  margin-bottom:20px;
}

/* TABLA */
table{
  width:100%;
  border-collapse:collapse;
  border-radius:15px;
  overflow:hidden;
}

th{
  background:#0b2c6b;
  color:white;
  padding:10px;
}

td{
  border:1px solid #ccc;
  padding:10px;
}

tr:hover{
  background:#e6eefc;
}

/* MARCA AGUA */
body::after {
  content: "";
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 150px;
  height: 150px;
  background: url("img/marcaagua.jpg") no-repeat center;
  background-size: contain;
  opacity: 0.1;
}

/* 📱 MOBILE */
@media (max-width: 768px){

  .container{
    width:100%;
  }

  table tr:first-child{
    display:none;
  }

  table tr{
    display:block;
    background:white;
    margin-bottom:12px;
    padding:12px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
    border-left:5px solid #0e4ea8;
  }

  table td{
    display:flex;
    justify-content:space-between;
    border:none;
    padding:6px 0;
  }

  table td:nth-child(1)::before{
    content:"Nombre";
    font-weight:bold;
    color:#0e4ea8;
  }

  table td:nth-child(2)::before{
    content:"Rol";
    font-weight:bold;
    color:#0e4ea8;
  }

}
</style>
</head>

<body>

<div class="container">

  <h1 id="titulo"></h1>

  <!-- FOTO GRUPAL -->
  <img id="imagen" class="imagen-grupo">

  <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Rol</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

</div>

<script>

// OBTENER TIPO
const params = new URLSearchParams(window.location.search);
const tipo = params.get("tipo");

// URLs DE CADA HOJA (PON LAS TUYAS)
const urls = {

  docentes: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSxOWHSro-uGrQijP6JciK33A7PmOOVYZSljbWE-MqX6thFkzgN_OIcryAezZjslCaoJHp_VuobSjeA/pub?gid=0&single=true&output=csv",
  directivos: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSxOWHSro-uGrQijP6JciK33A7PmOOVYZSljbWE-MqX6thFkzgN_OIcryAezZjslCaoJHp_VuobSjeA/pub?gid=1537285125&single=true&output=csv",
  asistentes: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSxOWHSro-uGrQijP6JciK33A7PmOOVYZSljbWE-MqX6thFkzgN_OIcryAezZjslCaoJHp_VuobSjeA/pub?gid=1950526140&single=true&output=csv"

};

// VALIDAR
if (!urls[tipo]) {
  document.body.innerHTML = "<h2>Sección no válida</h2>";
  throw new Error("Tipo inválido");
}

const url = urls[tipo];

// CAMBIAR TITULO
const titulo = document.getElementById("titulo");

if (tipo === "docentes") titulo.innerText = "Docentes";
if (tipo === "directivos") titulo.innerText = "Equipo Directivo";
if (tipo === "asistentes") titulo.innerText = "Asistentes de la Educación";

// FETCH 
fetch(url)
  .then(res => res.text())
  .then(data => {

    const filas = data.split("\n");
    const tabla = document.getElementById("tabla");

    filas.slice(1).forEach(fila => {

      const separador = fila.includes(";") ? ";" : ",";

      const col = fila
        .split(new RegExp(`${separador}(?=(?:(?:[^"]*"){2})*[^"]*$)`))
        .map(c => c.replace(/"/g, "").trim());

      if (col.length < 2) return;

      const tr = document.createElement("tr");

      const tdNombre = document.createElement("td");
      const tdRol = document.createElement("td");

      tdNombre.textContent = col[0];
      tdRol.textContent = col[1];

      tr.appendChild(tdNombre);
      tr.appendChild(tdRol);

      tabla.appendChild(tr);

    });

  })
  .catch(err => console.error("Error:", err));

</script>

</body>
</html>
