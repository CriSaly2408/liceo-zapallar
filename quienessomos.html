<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiénes Somos</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #0b2c6b, #0e4ea8);
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:800px;
  background:#f2f2f2;
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
  text-align:center;
  color:#0b2c6b;
  margin-bottom:20px;
}

.imagen-grupo{
  width:100%;
  border-radius:15px;
  margin-bottom:20px;
}

/* TABLA */
table{
  width:100%;
  border-collapse:collapse;
  border-radius:15px;
  overflow:hidden;
}

th{
  background:#0b2c6b;
  color:white;
  padding:10px;
}

td{
  border:1px solid #ccc;
  padding:10px;
}

tr:hover{
  background:#e6eefc;
}

/* BOTÓN FOTO */
.btn-foto{
  margin-left:140px;
  padding:8px 8px;
  background:linear-gradient(135deg, #0e4ea8, #c5ff19);
  color:white;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
  position:relative;
}

/* PREVIEW */
.preview-img{
  position:absolute;
  bottom:120%;
  left:0;
  width:180px;
  border-radius:10px;
  display:none;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.btn-foto:hover .preview-img{
  display:block;
}

/* MODAL GRANDE */
.modal-img{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-img img{
  max-width:80%;
  max-height:80%;
  border-radius:15px;
}

/* MARCA AGUA */
body::after {
  content:"";
  position:fixed;
  bottom:20px;
  right:20px;
  width:150px;
  height:150px;
  background:url("img/marcaagua.jpg") no-repeat center;
  background-size:contain;
  opacity:0.1;
}

/* 📱 MOBILE */
@media (max-width:768px){

  .container{
    width:100%;
  }

  table tr:first-child{
    display:none;
  }

  table tr{
    display:block;
    background:white;
    margin-bottom:12px;
    padding:12px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
    border-left:5px solid #0e4ea8;
  }

  table td{
    display:flex;
    justify-content:space-between;
    border:none;
    padding:6px 0;
  }

  table td:nth-child(1)::before{
    content:"Nombre";
    font-weight:bold;
    color:#0e4ea8;
  }

  table td:nth-child(2)::before{
    content:"Rol";
    font-weight:bold;
    color:#0e4ea8;
  }

}
</style>
</head>

<body>

<div class="container">

  <h1 id="titulo"></h1>

  <img id="imagen" class="imagen-grupo">

  <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Rol</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

</div>

<!-- MODAL -->
<div id="modalImagen" class="modal-img">
  <img id="imgGrande">
</div>

<script>

// PARAM
const params = new URLSearchParams(window.location.search);
const tipo = params.get("tipo");

const urls = {
  docentes: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSxOWHSro-uGrQijP6JciK33A7PmOOVYZSljbWE-MqX6thFkzgN_OIcryAezZjslCaoJHp_VuobSjeA/pub?gid=0&single=true&output=csv",
  directivos: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSxOWHSro-uGrQijP6JciK33A7PmOOVYZSljbWE-MqX6thFkzgN_OIcryAezZjslCaoJHp_VuobSjeA/pub?gid=1537285125&single=true&output=csv",
  asistentes: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSxOWHSro-uGrQijP6JciK33A7PmOOVYZSljbWE-MqX6thFkzgN_OIcryAezZjslCaoJHp_VuobSjeA/pub?gid=1950526140&single=true&output=csv"
};

if (!urls[tipo]) {
  document.body.innerHTML = "<h2>Sección no válida</h2>";
  throw new Error("Tipo inválido");
}

const url = urls[tipo];

// TITULO
const titulo = document.getElementById("titulo");

if (tipo === "docentes") titulo.innerText = "Docentes";
if (tipo === "directivos") titulo.innerText = "Equipo Directivo";
if (tipo === "asistentes") titulo.innerText = "Asistentes de la Educación";

// FETCH
fetch(url)
  .then(res => res.text())
  .then(data => {

    const filas = data.split("\n");
    const tabla = document.getElementById("tabla");

    filas.slice(1).forEach(fila => {

      const separador = fila.includes(";") ? ";" : ",";

      const col = fila
        .split(new RegExp(`${separador}(?=(?:(?:[^"]*"){2})*[^"]*$)`))
        .map(c => c.replace(/"/g, "").trim());

      if (col.length < 2) return;

      const nombre = col[0];
      const rol = col[1];
      const imagen = col[2]; 

      const tr = document.createElement("tr");

      const tdNombre = document.createElement("td");
      const tdRol = document.createElement("td");

      const contenedor = document.createElement("div");
      contenedor.style.display = "flex";
      contenedor.style.alignItems = "center";

      const spanNombre = document.createElement("span");
      spanNombre.textContent = nombre;

      contenedor.appendChild(spanNombre);

      // 🔥 SOLO SI HAY IMAGEN
      if (imagen) {

        const btn = document.createElement("div");
        btn.className = "btn-foto";
        btn.textContent = "📷";

        const preview = document.createElement("img");
        preview.src = imagen;
        preview.className = "preview-img";

        btn.appendChild(preview);

        btn.addEventListener("click", () => {
          document.getElementById("modalImagen").style.display = "flex";
          document.getElementById("imgGrande").src = imagen;
        });

        contenedor.appendChild(btn);
      }

      tdNombre.appendChild(contenedor);
      tdRol.textContent = rol;

      tr.appendChild(tdNombre);
      tr.appendChild(tdRol);

      tabla.appendChild(tr);

    });

  })
  .catch(err => console.error("Error:", err));

// CERRAR MODAL
document.getElementById("modalImagen").addEventListener("click", () => {
  document.getElementById("modalImagen").style.display = "none";
});

</script>

</body>
</html>
